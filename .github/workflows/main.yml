name: Build and deploy Python app to Azure Web App - crgolden-curator

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Curator
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better Sonar analysis relevancy

      # Curator depends on the sibling psnpy repo, which is also private and has no published release
      # yet, so it can't be installed from PyPI or a release wheel (see the pip install step below).
      # Cross-checking it out here is the only way to get it into this job at all; PACKAGES_READ_TOKEN
      # is the workspace's existing PAT-backed secret used wherever a workflow needs to read another
      # private crgolden repo. TODO: replace this with installing the published psnpy release wheel once
      # psnpy starts tagging releases.
      - name: Checkout psnpy
        uses: actions/checkout@v6
        with:
          repository: crgolden/psnpy
          token: ${{ secrets.PACKAGES_READ_TOKEN }}
          path: psnpy-src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # Do NOT `pip install -e .` here: pyproject.toml's psnpy dependency is a release-wheel URL pin
      # (github.com/crgolden/psnpy/releases/download/...) that doesn't exist yet, so resolving Curator's
      # own dependency list would fail outright. Install the sibling checkout directly instead, then the
      # rest of Curator's runtime + dev dependencies by hand.
      - name: Install dependencies
        run: |
          python -m pip install ./psnpy-src
          python -m pip install fastapi uvicorn authlib cryptography "psycopg[binary]" pytest httpx pytest-cov ruff mypy
          python -m pip install "opentelemetry-sdk>=1.27.0,<2.0.0" "opentelemetry-exporter-otlp-proto-grpc>=1.27.0,<2.0.0" "opentelemetry-instrumentation-fastapi>=0.48b0" "opentelemetry-instrumentation-psycopg>=0.48b0" "opentelemetry-instrumentation-requests>=0.48b0" "elasticsearch>=8.0.0,<9.0.0"

      # Each of the three checks below runs as its own step (rather than one combined lint stage) so a
      # failure is attributable to the specific tool at a glance in the Actions UI.
      - name: Ruff lint
        run: python -m ruff check src tests app.py

      - name: Ruff format check
        run: python -m ruff format --check src tests app.py

      - name: Mypy
        env:
          MYPYPATH: src
        run: python -m mypy src tests app.py

      # Unit tests only: db/tests/test_schema.py integration tests are gated on CURATOR_TEST_DATABASE_URL
      # (unset here) and auto-skip; there is no live PostgreSQL instance in this job.
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: python -m pytest --cov=src/curator --cov-report=xml:coverage.xml --cov-report=term -q

      # SonarCloud analysis — runs after coverage is generated and tests pass.
      # Uses sonarqube-scan-action (no JDK/scanner setup required); sonarcloud-github-action is deprecated.
      - name: SonarCloud analysis
        uses: sonarsource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,.venv/**
            -Dsonar.scanner.skipJreProvisioning=true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write   # Required for requesting the JWT (Azure OIDC)
      contents: read

    steps:
      - name: Checkout Curator
        uses: actions/checkout@v6

      # Curator's psnpy dependency (pyproject.toml) is a release-wheel URL pin, but the deploy package is
      # built directly from a local vendor/ directory instead of letting Oryx fetch that URL at build time —
      # vendoring here keeps the deploy independent of GitHub release-asset availability during the Oryx
      # build. psnpy is a private repo, so the plain GITHUB_TOKEN can't read its releases; PACKAGES_READ_TOKEN
      # is the workspace's existing PAT-backed secret used wherever a workflow needs to read another private
      # crgolden repo.
      - name: Vendor psnpy wheel
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN }}
        run: gh release download v0.2.0 --repo crgolden/psnpy --pattern '*.whl' --dir vendor

      # Assemble the deploy payload with only what production needs: source, the SQL migration, the
      # vendored wheel, and the install manifest — excludes tests/, .github/, and local caches.
      - name: Assemble deployment package
        run: |
          mkdir -p publish
          cp -r src publish/src
          cp -r db publish/db
          cp -r vendor publish/vendor
          cp requirements.txt publish/requirements.txt
          cp app.py publish/app.py

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C4CF7EE65BC442259601FFDB3B86513D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D1FC42A8E15547A18F5A397D64F179D0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6E3B3EB281E4D4C85FC7D1501EE1170 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383  # v3.0.8
        with:
          app-name: 'crgolden-curator'
          package: publish/
