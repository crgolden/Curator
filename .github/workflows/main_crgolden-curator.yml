# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - crgolden-curator

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  test:
    if: github.actor != 'dependabot[bot]'
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout Curator
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better Sonar analysis relevancy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      # Each of the three checks below runs as its own step (rather than one combined lint stage) so a
      # failure is attributable to the specific tool at a glance in the Actions UI.
      - name: Ruff lint
        run: python -m ruff check src tests app.py dev_server.py

      - name: Ruff format check
        run: python -m ruff format --check src tests app.py dev_server.py

      - name: Mypy
        env:
          MYPYPATH: src
        run: python -m mypy src tests app.py dev_server.py

      # Unit tests only: db/tests/test_schema.py integration tests are gated on CURATOR_TEST_DATABASE_URL
      # (unset here) and auto-skip; there is no live PostgreSQL instance in this job.
      - name: Run tests with coverage
        env:
          PYTHONPATH: src
        run: python -m pytest --cov=src/curator --cov-report=xml:coverage.xml --cov-report=term -q

      # SonarCloud analysis — runs after coverage is generated and tests pass.
      # Uses sonarqube-scan-action (no JDK/scanner setup required); sonarcloud-github-action is deprecated.
      - name: SonarCloud analysis
        uses: sonarsource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/__pycache__/**,**/*.pyc,.venv/**
            -Dsonar.scanner.skipJreProvisioning=true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write   # Required for requesting the JWT (Azure OIDC)
      contents: read

    steps:
      - name: Checkout Curator
        uses: actions/checkout@v6

      # Assemble the deploy payload with only what production needs: source, the SQL migration, and the
      # install manifest — excludes tests/, .github/, and local caches.
      - name: Assemble deployment package
        run: |
          mkdir -p publish
          cp -r src publish/src
          cp -r db publish/db
          cp requirements.txt publish/requirements.txt
          cp app.py publish/app.py

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v3.0.0
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_29C8B941EEC941B3B025951A74F5176F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7933356A53994B7987CBFABB49879C36 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1FCCBD0626644623AC4FF179F9E82B74 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # Runs BEFORE the app deploy (matching Identity's SqlPackage-before-app-deploy pattern) so the new
      # code never starts against a schema it doesn't expect. db/run_migrations.py is idempotent -- it
      # tracks applied filenames in a schema_migrations table and only runs files not already recorded --
      # so this is safe to run on every deploy, not just ones that actually changed db/migrations/.
      - name: Run database migrations
        env:
          CURATOR_DATABASE_URL: ${{ secrets.CURATOR_DATABASE_URL }}
        run: |
          python -m pip install "psycopg[binary]>=3.1.0,<4.0.0"
          python db/run_migrations.py "$CURATOR_DATABASE_URL"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383  # v3.0.8
        with:
          app-name: 'crgolden-curator'
          package: publish/
